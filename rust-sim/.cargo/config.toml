# Emscripten link flags for the Godot web export (see GODOT_WEB.md). Target-scoped, so desktop
# builds (`just rust`) are untouched. From the godot-rust book "Export to web". Build with:
#   source ~/emsdk/emsdk_env.sh
#   GODOT4_BIN=$(which godot) cargo +nightly build -p smash_sim \
#     -Zbuild-std --target wasm32-unknown-emscripten
[target.wasm32-unknown-emscripten]
rustflags = [
    "-C", "link-args=-pthread",
    "-C", "target-feature=+atomics",
    "-C", "link-args=-sSIDE_MODULE=2",
    "-C", "llvm-args=-enable-emscripten-cxx-exceptions=0",
    "-Z", "default-visibility=hidden",
    "-Z", "link-native-libraries=no",
    "-Z", "emscripten-wasm-eh=false",
]
