# Patched: js-sys is wasm-bindgen-only, so gate it to wasm32-unknown-unknown. The emscripten target
# (wasm32-unknown-emscripten) has a real SystemTime clock and must NOT pull js-sys (it fails to
# compile under threaded emscripten). See src/network/protocol.rs millis_since_epoch().
[target.'cfg(all(target_arch = "wasm32", target_os = "unknown"))'.dependencies.js-sys]
version = "0.3"
