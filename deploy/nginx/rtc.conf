# WebRTC signaling relay reverse-proxy. Installed to /etc/nginx/snippets/rtc.conf and `include`d in
# the 443 hafley.codes server block. Browsers (the Godot web export) connect to wss://hafley.codes/rtc;
# nginx upgrades the WebSocket and forwards to the smash-signaling binary on loopback. The relay only
# pairs peers and forwards SDP/ICE; gameplay is direct WebRTC P2P after the handshake.
location /rtc {
    proxy_pass http://127.0.0.1:3537;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 1d;       # signaling sockets stay open for the duration of matchmaking
    proxy_send_timeout 1d;
}
