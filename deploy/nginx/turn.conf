# TURN credential endpoint. The Godot client GETs https://hafley.codes/turn; nginx forwards to the
# smash-signaling binary on loopback, which mints a short-lived coturn REST credential (HMAC of the
# shared TURN_SECRET) and returns an RTCIceServer JSON. The secret never leaves the box. See
# signaling/src/turn.rs. Installed to /etc/nginx/snippets/turn.conf and `include`d in the 443 block.
location = /turn {
    proxy_pass http://127.0.0.1:3537;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
