# Netcode event firehose sink. The Godot client POSTs JSON events to https://hafley.codes/ev; nginx
# forwards to the smash-signaling binary on loopback, which stamps the REAL client IP (read from the
# X-Forwarded-For set here) + recv time and appends to a rotating JSON-lines log. See
# signaling/src/events.rs. Installed to /etc/nginx/snippets/ev.conf and `include`d in the 443 block.
location = /ev {
    proxy_pass http://127.0.0.1:3537;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
