# Real Godot web export served at https://hafley.codes/game/ (static files from a Godot 4.5
# "Web" export with extensions_support + thread_support). Included into the 443 server block by
# setup-vps.sh. The threaded wasm build needs SharedArrayBuffer, which the browser only grants in a
# cross-origin-isolated context, so COOP/COEP headers are mandatory here. All assets are same-origin
# so require-corp is satisfied without per-file CORP headers.

# Bare /game/ : the `index` module otherwise serves index.html without re-evaluating mime, leaking
# it as octet-stream (browser downloads instead of renders). Internally rewrite to the explicit file
# so it re-enters the prefix location below, picking up the text/html type and COOP/COEP headers.
# `last` keeps the URL clean (no client redirect).
location = /game/ {
    rewrite ^ /game/index.html last;
}

location /game/ {
    alias /var/www/smash-godot/;
    try_files $uri $uri/ /game/index.html;
    add_header Cross-Origin-Opener-Policy   "same-origin"  always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # The ~40MB Godot engine wasm is the whole loading screen. It compresses ~3-4x, so gzip it (plus
    # the 4MB JS glue + our lib wasm). on-the-fly at a cheap comp level; 304s skip re-compression.
    gzip on;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types application/wasm application/javascript text/javascript application/json;

    # Fixed filenames every build, so cache by content, not forever. `no-cache` = must-revalidate:
    # a changed file returns fresh 200, an unchanged 40MB engine returns a tiny 304 and stays cached.
    # Busts stale code on deploy AND keeps repeat loads fast. (`no-store` would re-pull all 40MB every
    # load -- that IS the loading screen, so don't.)
    add_header Cache-Control "no-cache" always;
    # A `types {}` block shadows the global mime.types map for this location, so every extension
    # the export uses must be listed or it falls back to default_type (octet-stream). Godot fetches
    # .pck/.wasm as arraybuffers regardless, but .html/.js/.css must carry correct types.
    types {
        text/html                html htm;
        text/css                 css;
        text/javascript          js;
        application/json         json;
        application/wasm         wasm;
        image/png                png;
        image/x-icon             ico;
        application/octet-stream pck;
    }
}
