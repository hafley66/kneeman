# Serve the wasm game at https://hafley.codes/play/ (static files from `trunk build`).
# Included into the 443 server block by setup-vps.sh. Built with `--public-url /play/`, so the
# generated asset URLs are absolute under /play/. SPA-style fallback to index.html.
location /play/ {
    alias /var/www/smash/;
    try_files $uri $uri/ /play/index.html;
    add_header Cache-Control "no-cache";
}
