# Pose-capture web app + capture-upload sink.
#   App:     https://hafley.codes/game/poses/           (static; getUserMedia needs TLS -> works here)
#   Uploads: PUT https://hafley.codes/game/poses/uploads/<name>.zip
#
# Uploads land straight on disk via nginx WebDAV (this build has --with-http_dav_module), so there is
# NO app server and NO :8080 proxy involved. The friend's phone PUTs the capture zip; `just poses-pull`
# rsyncs it back to your Mac. Paths here are the defaults baked into deploy/scripts/poses.sh.
#
# NOTE: the upload location is an open PUT sink (anyone who knows the URL can drop a <=128M zip).
# Fine for a short-lived personal capture session; add a token/auth if you leave it up.

location = /game/poses { return 301 /game/poses/; }

location /game/poses/ {
    alias /var/www/smash-poses/;
    index index.html;
    try_files $uri $uri/ /game/poses/index.html;

    # Fixed filenames + a tool that changes under people mid-session => never cache. `no-store`
    # means the browser re-fetches every load, so a redeploy is instantly live (no hard-refresh).
    # (No `expires` directive: it would emit a second, weaker Cache-Control header.)
    add_header Cache-Control "no-store" always;
}

location /game/poses/uploads/ {
    alias /var/www/smash-poses-uploads/;
    client_max_body_size 128m;
    client_body_temp_path /var/www/smash-poses-uploads/.tmp;  # same filesystem -> PUT rename is atomic
    dav_methods PUT DELETE;
    create_full_put_path on;
    dav_access user:rw group:rw all:r;
    limit_except GET PUT DELETE { deny all; }
    autoindex on;   # browse what's landed at /game/poses/uploads/
}
