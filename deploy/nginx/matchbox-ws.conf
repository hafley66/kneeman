# matchbox signaling reverse-proxy. Installed to /etc/nginx/snippets/matchbox-ws.conf and
# `include`d inside the existing 443 hafley.codes server block (which owns the TLS cert).
# Browsers connect to wss://hafley.codes/ws?next=2 ; nginx upgrades the WebSocket and forwards
# the full /ws path to matchbox_server on loopback (matchbox uses the path as the room id, so it
# must stay a single segment). `?next=2` pairs peers two at a time. matchbox does only the P2P
# handshake; gameplay is direct WebRTC P2P after pairing.
location /ws {
    proxy_pass http://127.0.0.1:3536;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 1d;       # signaling sockets stay open for the match
    proxy_send_timeout 1d;
}
