# matchbox signaling reverse-proxy. Installed to /etc/nginx/snippets/matchbox-ws.conf and
# `include`d inside the existing 443 hafley.codes server block (which owns the TLS cert).
# Browsers + native clients connect to wss://hafley.codes/ws ; nginx upgrades the WebSocket
# and forwards to matchbox_server bound on loopback. matchbox does only the P2P handshake;
# gameplay traffic is direct peer-to-peer over WebRTC after pairing.
location /ws {
    proxy_pass http://127.0.0.1:3536;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 1d;       # signaling sockets stay open for the match
    proxy_send_timeout 1d;
}
