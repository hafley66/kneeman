# coturn TURN relay for smash netplay. The ICE fallback for peer pairs that can't connect directly
# (symmetric NAT / VPN on both ends). Authentication is the REST scheme (use-auth-secret): the relay
# hands clients an ephemeral HMAC credential derived from `static-auth-secret`, and coturn re-derives
# the same HMAC to authorize the session. Keep `static-auth-secret` == the relay's TURN_SECRET.
#
# Install: /etc/turnserver.conf   (see deploy/coturn/install.sh)
# Ports that MUST be open on the Vultr firewall + ufw:
#   3478/udp 3478/tcp        signaling/allocation
#   49160-49200/udp          relay media range (min-port..max-port below)

# Listen on all interfaces; coturn relays through the box's own public IP.
listening-port=3478

# REST-API auth: no per-user passwords, just the shared secret. Set it to the SAME value as the
# relay's TURN_SECRET (both read it; neither ships it to clients). Overwritten by install.sh.
use-auth-secret
static-auth-secret=REPLACE_ME

# Realm is required by the long-term-credential mechanism; any stable string works.
realm=hafley.codes

# Relay media port range — keep small and open exactly this range on the firewall.
min-port=49160
max-port=49200

# A single 1-core box: cap relay threads and log to journald (systemd unit runs it in foreground).
no-cli
no-tls
no-dtls
# Don't relay to loopback/private ranges from the internet (anti-abuse; TURN is for public media only).
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
