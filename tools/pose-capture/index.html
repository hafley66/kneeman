<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Smash Pose Capture</title>
<style>
  :root { --bg:#12121a; --panel:#1c1c28; --ink:#e8e8f0; --accent:#7cc4ff; --good:#8ee08e; --warn:#ffcf6b; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.4 -apple-system,Segoe UI,Roboto,sans-serif; }
  header { padding:10px 14px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; background:var(--panel); position:sticky; top:0; z-index:5; }
  header h1 { font-size:16px; margin:0; margin-right:auto; }
  header input, header select, header button { font:inherit; }
  input[type=text] { background:#0d0d14; color:var(--ink); border:1px solid #333; border-radius:6px; padding:5px 8px; }
  button { background:#2a2a3c; color:var(--ink); border:1px solid #3a3a52; border-radius:8px; padding:7px 12px; cursor:pointer; }
  button:hover { background:#34344a; }
  button.primary { background:var(--accent); color:#06121f; border-color:var(--accent); font-weight:600; }
  button.good { background:var(--good); color:#04210b; border-color:var(--good); font-weight:600; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  main { display:grid; grid-template-columns: 340px 1fr; gap:0; height:calc(100vh - 52px); }
  @media (max-width:820px){ main { grid-template-columns:1fr; height:auto; } }
  #stage { position:relative; background:
      linear-gradient(45deg,#20202c 25%,transparent 25%),
      linear-gradient(-45deg,#20202c 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#20202c 75%),
      linear-gradient(-45deg,transparent 75%,#20202c 75%);
    background-size:24px 24px; background-position:0 0,0 12px,12px -12px,-12px 0;
    display:flex; align-items:center; justify-content:center; overflow:hidden; }
  #view { max-width:100%; max-height:100%; }
  #cam { display:none; }
  #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding-top:14px; pointer-events:none; }
  #prompt { background:rgba(0,0,0,.6); border-radius:10px; padding:8px 14px; text-align:center; max-width:90%; }
  #prompt .clip { color:var(--accent); font-weight:700; font-size:18px; }
  #prompt .pm { color:var(--warn); font-size:12px; }
  #prompt .desc { font-size:14px; margin-top:2px; }
  #count { font-size:120px; font-weight:800; color:#fff; text-shadow:0 4px 20px #000; margin-top:6vh; }
  #controls { position:absolute; bottom:0; left:0; right:0; display:flex; gap:10px; justify-content:center; padding:14px; pointer-events:auto; }
  aside { background:var(--panel); overflow-y:auto; padding:10px; }
  .clip-row { display:flex; align-items:center; gap:8px; padding:6px; border-radius:8px; cursor:pointer; }
  .clip-row:hover { background:#26263a; }
  .clip-row.active { background:#2f2f4a; outline:1px solid var(--accent); }
  .clip-row .badge { width:22px; height:22px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center; font-size:12px; background:#333; }
  .clip-row.done .badge { background:var(--good); color:#04210b; }
  .clip-row .meta { flex:1; min-width:0; }
  .clip-row .nm { font-weight:600; }
  .clip-row .sub { font-size:11px; opacity:.7; }
  .clip-row .req { color:var(--warn); font-size:10px; }
  .thumbs { display:flex; gap:4px; margin-left:auto; }
  .thumbs img { height:34px; border-radius:4px; background:#0d0d14; }
  .hint { font-size:12px; opacity:.7; padding:4px 6px; }
  .seg-off #view { filter:none; }
  #ghost { position:absolute; inset:0; margin:auto; height:78%; width:auto; max-width:92%; opacity:.45;
    object-fit:contain; pointer-events:none; image-rendering:pixelated; filter:drop-shadow(0 0 6px #000); display:none; }
</style>
</head>
<body>
<header>
  <h1>🎮 Pose Capture</h1>
  <label class="hint">dir <input id="dir" type="text" value="friends/chris" size="12"></label>
  <label class="hint">prefix <input id="prefix" type="text" value="chris" size="8"></label>
  <select id="camsel"></select>
  <label class="hint"><input id="mirror" type="checkbox" checked> mirror</label>
  <label class="hint" title="overlay ref/<clip><n>.png as a ghost to match"><input id="showref" type="checkbox" checked> ref</label>
  <button id="export" class="good" disabled>Export .zip</button>
  <button id="send" disabled title="PUT the zip to /game/poses/uploads/ on the box">⬆ Send to box</button>
</header>
<main>
  <aside id="list"></aside>
  <section id="stage">
    <video id="cam" playsinline muted></video>
    <canvas id="view"></canvas>
    <img id="ghost" alt="">
    <div id="overlay">
      <div id="prompt">
        <div class="clip" id="pClip">idle</div>
        <div class="pm" id="pPm"></div>
        <div class="desc" id="pDesc"></div>
        <div class="desc" id="pProg" style="opacity:.7;font-size:12px"></div>
      </div>
      <div id="count"></div>
    </div>
    <div id="controls">
      <button id="prev">◀</button>
      <button id="shoot" class="primary">Capture frame (3s)</button>
      <button id="shootNow">Snap now</button>
      <button id="retake">Clear clip</button>
      <button id="next">▶</button>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" crossorigin></script>
<script>
// ── The capture spec. Mirrors ALL_CLIPS in rust-sim/shell/src/sprite.rs + clip_for prompts.
// frames = how many held poses to shoot; the game slices them as a Poses clip.
const CLIPS = [
  { name:"idle",       pm:"Wait",        desc:"Stand ready, weight centered, slight bounce", frames:2, loop:true,  fps:6,  req:true },
  { name:"walk",       pm:"Walk",        desc:"Mid-stride — one foot forward, arms swinging", frames:2, loop:true,  fps:8 },
  { name:"run",        pm:"Dash",        desc:"Hard sprint lean, arms pumping",               frames:2, loop:true,  fps:13 },
  { name:"skid",       pm:"RunBrake",    desc:"Skid-stop: lean back, heel dug in",            frames:1, loop:false, fps:1 },
  { name:"crouch",     pm:"Squat",       desc:"Duck low, knees bent",                         frames:1, loop:false, fps:1 },
  { name:"jump",       pm:"JumpF",       desc:"Rising — legs tucked, arms up",                frames:1, loop:false, fps:1 },
  { name:"fall",       pm:"Fall",        desc:"Falling — loose, reaching down",               frames:1, loop:false, fps:1 },
  { name:"hang",       pm:"CliffCatch",  desc:"Dangling by both hands",                       frames:1, loop:false, fps:1 },
  { name:"climb",      pm:"CliffClimb",  desc:"Pulling up over a ledge, knee up",             frames:2, loop:false, fps:8 },
  { name:"jab",        pm:"Attack11",    desc:"Quick straight punch, arm extended",           frames:2, loop:false, fps:18 },
  { name:"nair",       pm:"AttackAirN",  desc:"Neutral air — sex-kick, limbs out",            frames:2, loop:true,  fps:14 },
  { name:"dtilt",      pm:"AttackLw3",   desc:"Crouched low sweep at the ankles",             frames:2, loop:false, fps:20 },
  { name:"dair",       pm:"Falcon stomp",desc:"One foot driving straight DOWN",               frames:2, loop:false, fps:20 },
  { name:"wallbounce", pm:"DamageFly",   desc:"Splatted flat, limbs trailing",                frames:1, loop:false, fps:1 },
];

const $ = s => document.querySelector(s);
const cam = $('#cam'), view = $('#view'), vctx = view.getContext('2d');
const shots = {}; // name -> [dataURL, ...]
let active = 0, W = 640, H = 640;

// ── local persistence: shots live in IndexedDB under "<prefix>/<clip>", so a session
// survives reloads and a friend can come back later to key clips added to CLIPS since.
// dir/prefix themselves persist in localStorage so the page reopens on the same profile.
function idb(){ return new Promise((res,rej)=>{
  const r = indexedDB.open('pose-capture', 1);
  r.onupgradeneeded = () => r.result.createObjectStore('shots');
  r.onsuccess = () => res(r.result);
  r.onerror = () => rej(r.error);
});}
function profile(){ return $('#prefix').value.trim() || 'custom'; }
async function saveClip(name){
  const db = await idb(), t = db.transaction('shots','readwrite'), st = t.objectStore('shots');
  const key = `${profile()}/${name}`, arr = shots[name]||[];
  arr.length ? st.put(arr, key) : st.delete(key);
  return new Promise((res,rej)=>{ t.oncomplete=res; t.onerror=()=>rej(t.error); });
}
async function restoreShots(){
  Object.keys(shots).forEach(k => delete shots[k]);
  const p = profile(), db = await idb();
  await new Promise((res,rej)=>{
    const cur = db.transaction('shots').objectStore('shots')
      .openCursor(IDBKeyRange.bound(p+'/', p+'/￿'));
    cur.onsuccess = () => { const c = cur.result;
      if (!c) return res();
      shots[c.key.slice(p.length+1)] = c.value; c.continue(); };
    cur.onerror = () => rej(cur.error);
  });
  paintList(); updatePrompt();
}
function savePrefs(){
  localStorage.setItem('pose-capture:dir', $('#dir').value);
  localStorage.setItem('pose-capture:prefix', $('#prefix').value);
}
function loadPrefs(){
  const d = localStorage.getItem('pose-capture:dir'), p = localStorage.getItem('pose-capture:prefix');
  if (d) $('#dir').value = d;
  if (p) $('#prefix').value = p;
}

// ── camera ────────────────────────────────────────────────────────────────
async function listCams(){
  const devs = (await navigator.mediaDevices.enumerateDevices()).filter(d=>d.kind==='videoinput');
  const sel = $('#camsel'); sel.innerHTML='';
  devs.forEach((d,i)=>{ const o=document.createElement('option'); o.value=d.deviceId; o.textContent=d.label||('Camera '+(i+1)); sel.appendChild(o); });
}
async function startCam(deviceId){
  if (cam.srcObject) cam.srcObject.getTracks().forEach(t=>t.stop());
  const stream = await navigator.mediaDevices.getUserMedia({
    video: deviceId ? {deviceId:{exact:deviceId}} : {facingMode:'user', width:{ideal:1080}, height:{ideal:1080}}, audio:false });
  cam.srcObject = stream; await cam.play();
  // square canvas centered on the video
  const s = Math.min(cam.videoWidth, cam.videoHeight) || 640; W = H = s;
  view.width = W; view.height = H;
  if (!$('#camsel').value) await listCams();
}

// ── draw: raw center-cropped camera to `view`. No live filter — background removal
// happens later (rembg u2net), which beats any in-browser video-call segmentation.
function render(){
  if (cam.readyState >= 2){
    const s = Math.min(cam.videoWidth, cam.videoHeight);
    const sx = (cam.videoWidth - s)/2, sy = (cam.videoHeight - s)/2; // center-crop to square
    vctx.save();
    if ($('#mirror').checked){ vctx.translate(W,0); vctx.scale(-1,1); }
    vctx.drawImage(cam, sx, sy, s, s, 0, 0, W, H);
    vctx.restore();
  }
}
function loop(){ render(); requestAnimationFrame(loop); }

// ── capture ───────────────────────────────────────────────────────────────
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function shootFrame(withCountdown){
  const c = CLIPS[active];
  shots[c.name] = shots[c.name] || [];
  if (shots[c.name].length >= c.frames) shots[c.name] = []; // wrap: re-shoot the clip
  if (withCountdown){
    for (let n=3;n>0;n--){ $('#count').textContent=n; await sleep(700); }
    $('#count').textContent='';
  }
  render();
  // grab as PNG (transparent if seg on)
  shots[c.name].push(view.toDataURL('image/png'));
  saveClip(c.name);
  paintList();
  // auto-advance to next needed frame within the clip
  updatePrompt();
  if (shots[c.name].length >= c.frames && active < CLIPS.length-1){ /* stay; user hits ▶ */ }
}

// ── UI ────────────────────────────────────────────────────────────────────
function paintList(){
  const box = $('#list'); box.innerHTML = '';
  const done = CLIPS.filter(c => (shots[c.name]||[]).length >= c.frames).length;
  const h = document.createElement('div'); h.className='hint';
  h.textContent = `${done}/${CLIPS.length} clips · idle is required, the rest fall back to it`;
  box.appendChild(h);
  CLIPS.forEach((c,i)=>{
    const got = (shots[c.name]||[]).length, full = got >= c.frames;
    const row = document.createElement('div');
    row.className = 'clip-row' + (i===active?' active':'') + (full?' done':'');
    row.onclick = ()=>{ active=i; updatePrompt(); paintList(); };
    row.innerHTML = `<div class="badge">${full?'✓':got||''}</div>
      <div class="meta"><div class="nm">${c.name} ${c.req?'<span class="req">REQ</span>':''}</div>
      <div class="sub">${c.pm} · ${got}/${c.frames} frame${c.frames>1?'s':''}</div></div>`;
    const th = document.createElement('div'); th.className='thumbs';
    (shots[c.name]||[]).forEach(u=>{ const im=new Image(); im.src=u; th.appendChild(im); });
    row.appendChild(th);
    box.appendChild(row);
  });
  const ready = (shots['idle']||[]).length < 1;
  $('#export').disabled = ready;
  $('#send').disabled = ready;
}
function updatePrompt(){
  const c = CLIPS[active], got=(shots[c.name]||[]).length;
  $('#pClip').textContent = c.name;
  $('#pPm').textContent = c.pm + (c.loop?' · looping':'');
  $('#pDesc').textContent = c.desc;
  $('#pProg').textContent = `frame ${Math.min(got+1,c.frames)} of ${c.frames}`;
  $('#shoot').textContent = c.frames>1 ? `Capture frame ${Math.min(got+1,c.frames)} (3s)` : 'Capture (3s)';
  updateGhost(c, got);
}

// ── reference ghost: ref/<stem>.png (same stems buildZip writes: idle / walk1,walk2).
// Missing file just hides the ghost, so ref/ is optional per clip.
function updateGhost(c, got){
  const g = $('#ghost');
  const stem = c.frames>1 ? `${c.name}${Math.min(got+1,c.frames)}` : c.name;
  g.style.display = 'none';
  if (!$('#showref').checked) return;
  g.onload = () => { g.style.display = 'block'; };
  g.onerror = () => { g.style.display = 'none'; };
  g.src = `ref/${stem}.png`;
}

// ── build: PNGs named <prefix>_<clip><n>.png + character.json (roster schema) ─
async function buildZip(){
  const dir = $('#dir').value.trim() || 'friends/custom';
  const prefix = $('#prefix').value.trim() || 'custom';
  const zip = new JSZip();
  const assetRoot = zip.folder('assets').folder(dir);
  const clipsJson = [];
  for (const c of CLIPS){
    const arr = shots[c.name]||[]; if (!arr.length) continue;
    const files = [];
    arr.forEach((url,idx)=>{
      const stem = arr.length>1 ? `${c.name}${idx+1}` : c.name;   // idle / walk1,walk2
      files.push(stem);
      assetRoot.file(`${prefix}_${stem}.png`, url.split(',')[1], {base64:true});
    });
    clipsJson.push({ name:c.name, files, frames:files.length, fps:c.fps, loop:c.loop });
  }
  const character = { dir, scale:1.0, offset_y:0.0, sheet:"poses", prefix, clips:clipsJson };
  zip.file('character.json', JSON.stringify(character, null, 2));
  zip.file('README.txt',
`Drop the assets/ folder into your Godot project (res://assets/${dir}/*.png).
Register the character by feeding character.json to roster::parse_character
(schema matches rust-sim/shell/src/roster.rs). idle is guaranteed; every other
clip falls back down clip_fallback() to idle, so partial captures still play.`);
  const blob = await zip.generateAsync({type:'blob'});
  return { blob, prefix };
}

// Download the zip to this device.
async function exportZip(){
  const {blob, prefix} = await buildZip();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = `${prefix}_capture.zip`; a.click();
}

// PUT the zip to the box's WebDAV sink. App is served from /game/poses/, so a relative
// `uploads/<name>.zip` lands in /game/poses/uploads/ (same origin -> no CORS).
async function uploadZip(){
  const btn = $('#send'), old = btn.textContent;
  btn.disabled = true; btn.textContent = 'building…';
  try {
    const {blob, prefix} = await buildZip();
    const stamp = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
    btn.textContent = 'uploading…';
    const res = await fetch(`uploads/${prefix}_${stamp}.zip`, {
      method:'PUT', headers:{'Content-Type':'application/zip'}, body:blob });
    btn.textContent = (res.ok || res.status===201||res.status===204) ? '✓ sent to box' : `err ${res.status}`;
  } catch(e){ btn.textContent = '✗ ' + e.message; }
  setTimeout(()=>{ btn.textContent = old; btn.disabled = (shots['idle']||[]).length < 1; }, 3500);
}

// ── wire up ───────────────────────────────────────────────────────────────
$('#camsel').onchange = e => startCam(e.target.value);
$('#showref').onchange = () => updatePrompt();
$('#shoot').onclick   = () => shootFrame(true);
$('#shootNow').onclick= () => shootFrame(false);
$('#retake').onclick  = () => { const n=CLIPS[active].name; shots[n]=[]; saveClip(n); paintList(); updatePrompt(); };
$('#prev').onclick    = () => { active=(active-1+CLIPS.length)%CLIPS.length; updatePrompt(); paintList(); };
$('#next').onclick    = () => { active=(active+1)%CLIPS.length; updatePrompt(); paintList(); };
$('#export').onclick  = exportZip;
$('#send').onclick    = uploadZip;
$('#dir').onchange    = savePrefs;
$('#prefix').onchange = () => { savePrefs(); restoreShots(); };

(async () => {
  loadPrefs();
  await restoreShots().catch(e => console.warn('restore failed:', e));
  try { await startCam(); } catch(e){ alert('Camera error: '+e.message+'\nServe over http://localhost or https and allow the camera.'); }
  paintList(); updatePrompt(); loop();
})();
</script>
</body>
</html>
